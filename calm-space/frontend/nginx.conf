# Configuration nginx pour servir la Single Page Application React.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des réponses pour accélérer le chargement
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Toutes les routes inconnues sont renvoyées vers index.html :
    # c'est React Router qui gère la navigation côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
