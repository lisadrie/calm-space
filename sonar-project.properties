# ============================================================================
#  Configuration SonarCloud — CalmSpace
#  ---------------------------------------------------------------------------
#  Indique à SonarCloud QUEL projet analyser et QUELS fichiers examiner.
#  L'analyse est lancée par le job "sonarcloud" de .github/workflows/ci.yml
# ============================================================================

# Identifiants du projet sur SonarCloud
sonar.projectKey=lisadrie_calm-space
sonar.organization=lisadrie

# Code source à analyser
sonar.sources=calm-space/backend,calm-space/frontend/src

# Fichiers exclus de l'analyse :
#  - node_modules : dépendances externes, ce n'est pas notre code
#  - build        : fichiers générés automatiquement
#  - coverage     : rapports de tests
#  - __tests__    : fichiers de tests (analysés séparément)
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/__tests__/**

# Encodage des fichiers
sonar.sourceEncoding=UTF-8
