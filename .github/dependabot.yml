# ============================================================================
#  Dependabot - CalmSpace (veille automatisée sur les dépendances)
#  ---------------------------------------------------------------------------
#  Dependabot surveille les dépendances du projet et ouvre automatiquement une
#  Pull Request quand une mise à jour (notamment de sécurité) est disponible.
#  Chaque PR est relue et validée par la CI (tests + audit) avant fusion :
#  la mise à jour est donc automatisée, mais jamais appliquée à l'aveugle.
#
#  Écosystèmes surveillés : npm (backend, frontend, mobile), les Dockerfiles
#  et les actions GitHub utilisées par les pipelines.
#
#  MAÎTRISE DU VOLUME
#  ------------------
#  À sa première activation, Dependabot rattrape tout le retard accumulé : la
#  configuration initiale a ouvert 15 PR d'un coup, ce qui rend la file de revue
#  inexploitable. Une file qu'on ne lit plus est une veille qui ne sert à rien.
#  Trois réglages ramènent le flux à un volume réellement traitable :
#
#    - `groups` : UNE PR par écosystème, mises à jour majeures incluses. Isoler
#      les majeures est plus rigoureux en théorie (ce sont elles qui cassent le
#      build), mais en pratique c'est la source principale du bruit. Regroupées,
#      elles restent visibles : si la PR groupée fait échouer la CI, on la
#      décompose ponctuellement pour identifier le paquet fautif.
#    - `schedule` : mensuel pour le frontend et le mobile, dont les dépendances
#      ne sont pas exposées en production. Hebdomadaire là où le risque est réel
#      (backend et images Docker).
#    - `open-pull-requests-limit` : plafonne la file par écosystème.
#
#  IMPORTANT — ces réglages ne concernent QUE les montées de version de
#  confort. Les **alertes de sécurité** (Dependabot security updates) suivent un
#  canal distinct, ne sont pas soumises à ces limites et restent traitées en
#  priorité. Réduire le bruit ne réduit donc pas la couverture sécurité.
# ============================================================================
version: 2

updates:
  # --- Backend : exposé en production, surveillance hebdomadaire ------------
  - package-ecosystem: npm
    directory: /calm-space/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels: [dependances, securite, backend]
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend:
        patterns: ["*"]
        update-types: [major, minor, patch]

  # --- Frontend : code de build, non exposé → rythme mensuel ---------------
  - package-ecosystem: npm
    directory: /calm-space/frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [dependances, frontend]
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend:
        patterns: ["*"]
        update-types: [major, minor, patch]

  # --- Mobile : application Expo, hors périmètre du Bloc 3 -----------------
  - package-ecosystem: npm
    directory: /calm-space/mobile
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [dependances, mobile]
    commit-message:
      prefix: "chore(deps)"
    groups:
      mobile:
        patterns: ["*"]
        update-types: [major, minor, patch]

  # --- Images de base des conteneurs ---------------------------------------
  # Surveille les tags des images `FROM` (node, nginx, postgres…) : c'est ce qui
  # apporte les correctifs de sécurité du système d'exploitation, invisibles
  # pour npm audit. Volontairement laissé en hebdomadaire et non regroupé :
  # ces PR sont rares, peu nombreuses, et prioritaires.
  - package-ecosystem: docker
    directory: /calm-space/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels: [dependances, securite, docker]
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /calm-space/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels: [dependances, securite, docker]
    commit-message:
      prefix: "chore(docker)"

  # --- Actions GitHub utilisées par les pipelines --------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [dependances, ci]
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-github:
        patterns: ["*"]
        update-types: [major, minor, patch]
