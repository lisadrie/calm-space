# ============================================================================
#  CI/CD - CalmSpace (Intégration et Déploiement Continus)
#  ---------------------------------------------------------------------------
#  Ce pipeline s'exécute automatiquement à chaque push et pull request.
#  Il garantit qu'aucun code cassé n'est intégré (lint + tests + build),
#  puis publie automatiquement les images Docker déployables.
#
#  Jobs :
#    - backend  : installe les dépendances, vérifie le lint, lance les tests Jest
#    - frontend : installe les dépendances, vérifie le lint et compile le build React
#    - deploy   : construit et publie les images Docker (uniquement si CI verte)
#
#  Les jobs backend et frontend tournent en parallèle sur des machines Ubuntu
#  propres. Le job deploy attend que LES DEUX soient verts avant de démarrer.
# ============================================================================
name: CI/CD - CalmSpace

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  # ---------------------------------------------------------------------------
  #  BACKEND : Express + PostgreSQL + JWT
  #  La base de données est mockée dans les tests → pas besoin de PostgreSQL ici.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend - Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: calm-space/backend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calm-space/backend/package-lock.json

      - name: Installation des dépendances (npm ci)
        run: npm ci

      - name: Analyse statique du code (ESLint)
        run: npm run lint --if-present

      - name: Exécution des tests unitaires (Jest)
        # SECRET_KEY factice pour la CI : les tests mockent la base de données,
        # mais la signature/vérification des jetons JWT a besoin d'une clé
        # cohérente entre le code et les tests. Ce N'EST PAS le secret de
        # production — celui-ci vit dans les variables d'environnement de
        # l'hébergeur (ou dans les GitHub Secrets), jamais dans le dépôt.
        env:
          SECRET_KEY: calmspace_secret_123
        run: npm test

  # ---------------------------------------------------------------------------
  #  FRONTEND : React + TypeScript + Tailwind
  #  Le build échoue automatiquement si un warning ESLint est détecté (CI=true).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: calm-space/frontend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calm-space/frontend/package-lock.json

      - name: Installation des dépendances (npm ci)
        run: npm ci

      - name: Compilation du build de production
        run: npm run build

  # ---------------------------------------------------------------------------
  #  DÉPLOIEMENT CONTINU (CD)
  #  Une fois la CI terminée ET verte, le déploiement se fait automatiquement :
  #  les images Docker du backend et du frontend sont construites puis publiées
  #  sur le registre GitHub (ghcr.io). L'environnement cible n'a plus qu'à faire
  #  un `docker compose pull && docker compose up -d` pour être à jour.
  #
  #  Conditions de déclenchement :
  #    - needs : les jobs backend ET frontend doivent avoir réussi ;
  #    - if    : uniquement sur un push vers master (pas sur les Pull Requests).
  #  → une PR est donc testée mais jamais déployée : seul le code fusionné
  #    sur la branche stable part en déploiement.
  # ---------------------------------------------------------------------------
  deploy:
    name: Déploiement - Publication des images Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write   # autorise l'écriture sur ghcr.io
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion au registre GitHub (ghcr.io)
        # GITHUB_TOKEN est fourni automatiquement par GitHub Actions :
        # aucun mot de passe n'est stocké dans le dépôt.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparation du nom des images (en minuscules)
        # ghcr.io n'accepte que des noms en minuscules.
        id: vars
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Construction et publication de l'image backend
        uses: docker/build-push-action@v6
        with:
          context: calm-space/backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.vars.outputs.repo }}/backend:${{ github.sha }}

      - name: Construction et publication de l'image frontend
        uses: docker/build-push-action@v6
        with:
          context: calm-space/frontend
          push: true
          build-args: |
            REACT_APP_API_URL=http://localhost:5001
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}/frontend:latest
            ghcr.io/${{ steps.vars.outputs.repo }}/frontend:${{ github.sha }}

      - name: Récapitulatif du déploiement
        run: |
          echo "### Déploiement automatique terminé" >> "$GITHUB_STEP_SUMMARY"
          echo "Images publiées sur ghcr.io (tag \`latest\` et \`${GITHUB_SHA}\`) :" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/${{ steps.vars.outputs.repo }}/backend" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/${{ steps.vars.outputs.repo }}/frontend" >> "$GITHUB_STEP_SUMMARY"
